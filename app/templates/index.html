<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Meal Prep</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>🍱 Student Meal Prep Weekly Dashboard</h1>

    <div class="days">
        <button onclick="loadDay('monday')">Monday</button>
        <button onclick="loadDay('tuesday')">Tuesday</button>
        <button onclick="loadDay('wednesday')">Wednesday</button>
        <button onclick="loadDay('thursday')">Thursday</button>
        <button onclick="loadDay('friday')">Friday</button>
        <button onclick="loadDay('saturday')">Saturday</button>
        <button onclick="loadDay('sunday')">Sunday</button>
    </div>

    <div id="meal-info">
        <p>Click a day to see meals!</p>
    </div>

    <div id="tracker">
        <h3>💰 Weekly Spending: $<span id="total">0.00</span></h3>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
